name: nature-data
version: 2.0.0
description: >
  Declarative manifest for the static/dynamic split. SKILL.md uses this to
  decide which fragments to load for a data-availability request.

# Design note: nature-data is a linear, parameterised workflow (inventory ->
# classify access route -> choose repository/identifier -> draft statement ->
# cite datasets -> FAIR audit). Its variation — journal, access route, user
# language — is handled at runtime by inline rules and the on-demand references,
# not by loading different large content bodies. There is therefore no content
# axis; the split is core (always loaded) plus on-demand references. nature-data
# does not use the prose-oriented _shared layer (it governs data-availability
# policy, with its own source basis).

always_load:
  - static/core/stance.md
  - static/core/workflow.md

references:
  on_demand:
    - condition: governing Nature/Springer Nature data-sharing rules or edge-case policy logic
      path: references/policy-principles.md
    - condition: ready-to-adapt Data Availability statement patterns
      path: references/statement-patterns.md
    - condition: repository choice, accession, DOI, embargo, versioning, or dataset citation guidance
      path: references/repository-and-identifiers.md
    - condition: FAIR checks, README metadata, file organization, licences, provenance, or DataCite fields
      path: references/fair-metadata-checklist.md
    - condition: justify rules with official sources or check which source supports which rule
      path: references/source-basis.md
