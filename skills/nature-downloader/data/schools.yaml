# Preset institution library
# Distributed with the skill, covering major universities in the CARSI public access list
# For maintainer documentation, see docs/maintainers.md
version: 1

# Field descriptions:
#   name:        Full institution name
#   aliases:     List of aliases (abbreviations), used for fuzzy matching
#   auth.type:   cas | jaccount | sso | custom
#   auth.sso_domain: Unified identity authentication domain
#   auth.carsi_entry: CARSI federation authentication entry URL (leave empty if none)
#   proxy.type:  ezproxy | null
#   proxy.ezproxy_url: EZproxy login address (leave empty if none)
#   libraries:   List of databases subscribed by the institution with institutional access
#   notes:       Special notes

schools:
  # ========== C9 League ==========
  - name: Shanghai Jiao Tong University
    aliases: [SJTU, sjtu, Jiaotong, Shanghai Jiaotong]
    auth:
      type: jaccount
      sso_domain: jaccount.sjtu.edu.cn
      carsi_entry: "https://jaccount.sjtu.edu.cn/"
    discovery:
      web_of_science_url: "https://webofscience.clarivate.cn/wos/woscc/basic-search"
    libraries: [IEEE Xplore, Web of Science, CNKI, ScienceDirect, Springer, ACS]
    notes: "CARSI entry requires login via jaccount before redirect"

  - name: Tsinghua University
    aliases: [THU, tsinghua, Tsinghua]
    auth:
      type: cas
      sso_domain: id.tsinghua.edu.cn
