# Maintenance Notes:
# 1. CARSI entry query: https://www.carsi.edu.cn/ (member institution list)
# 2. SSO domains are usually id.xxx.edu.cn / cas.xxx.edu.cn / sso.xxx.edu.cn
# 3. Accuracy is not guaranteed; the wizard performs connectivity self-checks and guides users if check fails
# 4. For new schools, reference the format above; include abbreviations in aliases
